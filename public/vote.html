<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Голосование</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Arial', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 20px 16px 40px;
  }

  .logo {
    font-size: 13px; color: #444;
    text-align: center; margin-bottom: 24px; margin-top: 8px;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .card {
    background: #1a1d2e;
    border: 1px solid #2a2d3e;
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%; max-width: 480px;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: #6366f1; font-weight: 600; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .live-badge {
    background: #1e1b4b; color: #a5b4fc;
    padding: 2px 8px; border-radius: 20px; font-size: 10px;
  }

  .q-text {
    font-size: clamp(18px, 4.5vw, 26px);
    font-weight: 700; line-height: 1.35;
    color: #fff; margin-bottom: 8px;
  }

  .q-hint {
    font-size: 12px; color: #555; margin-bottom: 24px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    background: #0f1117;
    border: 2px solid #2a2d3e;
    border-radius: 14px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 12px;
    user-select: none; -webkit-user-select: none;
  }
  .option:hover { border-color: #6366f1; background: #13152a; }
  .option.selected {
    border-color: #6366f1; background: #1e2244;
  }
  .option.selected .check { background: #6366f1; border-color: #6366f1; }
  .option.selected .check::after { display: block; }

  .check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #333; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .check.square { border-radius: 6px; }
  .check::after {
    content: ''; display: none;
    width: 10px; height: 10px; border-radius: 50%;
    background: #fff;
  }
  .check.square::after { border-radius: 3px; width: 9px; height: 9px; }

  .option-text { font-size: 16px; color: #e0e0e0; line-height: 1.3; }

  .submit-btn {
    margin-top: 20px;
    width: 100%; padding: 16px;
    background: #6366f1; color: #fff;
    border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .submit-btn:hover:not(:disabled) { background: #5558e8; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Success state */
  .success-card {
    text-align: center; padding: 40px 24px;
    animation: fadeUp 0.4s ease;
  }
  .success-icon { font-size: 64px; margin-bottom: 16px; }
  .success-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: #666; }

  /* Closed / waiting state */
  .state-card {
    text-align: center; padding: 48px 24px;
    animation: fadeUp 0.4s ease;
  }
  .state-icon { font-size: 56px; margin-bottom: 16px; }
  .state-title { font-size: 20px; font-weight: 600; color: #aaa; margin-bottom: 8px; }
  .state-sub { font-size: 13px; color: #555; }

  .revote-btn {
    margin-top: 16px;
    width: 100%; padding: 13px;
    background: transparent; color: #6366f1;
    border: 1px solid #6366f1; border-radius: 14px;
    font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .revote-btn:hover { background: rgba(99,102,241,0.1); }

  .connecting { color: #444; font-size: 14px; text-align: center; padding: 60px 0; }
</style>
</head>
<body>

<div class="logo">🗳️ Голосование</div>

<div id="root" class="connecting">Подключение...</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// Get username from URL ?user=
const params = new URLSearchParams(window.location.search);
const VOTE_USER = params.get('user') || '';
if (!VOTE_USER) {
  document.getElementById('root').innerHTML = '<div class="connecting">Неверная ссылка — отсутствует параметр ?user=</div>';
}

const socket = io({ auth: { publicUser: VOTE_USER } });
let currentState = null;
let hasVoted = false;
let selectedOptions = new Set();
let votedQuestionId = null;

// Track voted / revoted in localStorage
const STORAGE_KEY        = 'voted_questions';
const STORAGE_REVOTE_KEY = 'revoted_questions';

function getVotedMap()   { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)        || '{}'); } catch { return {}; } }
function getRevotedMap() { try { return JSON.parse(localStorage.getItem(STORAGE_REVOTE_KEY) || '{}'); } catch { return {}; } }

function markVoted(questionId) {
  const map = getVotedMap(); map[questionId] = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
}
function unmarkVoted(questionId) {
  const map = getVotedMap(); delete map[questionId];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(map));
}
function markRevoted(questionId) {
  const map = getRevotedMap(); map[questionId] = true;
  localStorage.setItem(STORAGE_REVOTE_KEY, JSON.stringify(map));
}
function hasVotedFor(questionId)   { return !!getVotedMap()[questionId]; }
function hasRevotedFor(questionId) { return !!getRevotedMap()[questionId]; }

socket.on('state_update', (s) => {
  currentState = s;
  render(s);
});

socket.on('connect_error', () => {
  document.getElementById('root').innerHTML = '<div class="connecting">Ошибка подключения. Обновите страницу.</div>';
});

function render(s) {
  const root = document.getElementById('root');
  const q = s.currentQuestion;

  if (!q) {
    root.innerHTML = `
      <div class="card state-card">
        <div class="state-icon">⏳</div>
        <div class="state-title">Ожидание вопроса</div>
        <div class="state-sub">Организатор скоро запустит голосование</div>
      </div>`;
    return;
  }

  // Already voted for this question
  if (hasVotedFor(q.id)) {
    renderSuccess(root, q);
    return;
  }

  if (!s.votingOpen) {
    root.innerHTML = `
      <div class="card state-card">
        <div class="state-icon">🔒</div>
        <div class="state-title">Голосование закрыто</div>
        <div class="state-sub">Ожидайте открытия голосования</div>
      </div>`;
    return;
  }

  // If question changed, reset selection
  if (votedQuestionId !== q.id) {
    selectedOptions.clear();
    votedQuestionId = q.id;
  }

  renderVoting(root, q, s);
}

function renderVoting(root, q, s) {
  const isMultiple = q.type === 'multiple';
  const hint = isMultiple ? 'Можно выбрать несколько вариантов' : 'Выберите один вариант';

  const optionsHtml = q.options.map(opt => `
    <div class="option ${selectedOptions.has(opt.id) ? 'selected' : ''}"
         onclick="toggleOption('${opt.id}', ${isMultiple})">
      <div class="check ${isMultiple ? 'square' : ''}"></div>
      <div class="option-text">${escHtml(opt.text)}</div>
    </div>
  `).join('');

  root.innerHTML = `
    <div class="card">
      <div class="q-label">Вопрос <span class="live-badge">LIVE</span></div>
      <div class="q-text">${escHtml(q.text)}</div>
      <div class="q-hint">${hint}</div>
      <div class="options">${optionsHtml}</div>
      <button class="submit-btn" id="submitBtn" onclick="submitVote('${q.id}')"
        ${selectedOptions.size === 0 ? 'disabled' : ''}>
        Проголосовать
      </button>
    </div>`;
}

function renderSuccess(root, q) {
  const showRevote = currentState?.votingOpen && !hasRevotedFor(q.id);

  root.innerHTML = `
    <div class="card success-card">
      <div class="success-icon">✅</div>
      <div class="success-title">Голос принят!</div>
      <div class="success-sub">Спасибо за участие</div>
      ${showRevote ? `<button class="revote-btn" onclick="startRevote('${q.id}')">↩ Переголосовать</button>` : ''}
    </div>`;
}

function startRevote(questionId) {
  markRevoted(questionId);   // использована единственная попытка
  unmarkVoted(questionId);   // снимаем флаг — теперь можно голосовать снова
  selectedOptions.clear();
  votedQuestionId = questionId;
  if (currentState) renderVoting(document.getElementById('root'), currentState.currentQuestion, currentState);
}

function toggleOption(id, isMultiple) {
  if (!currentState?.votingOpen) return;
  if (isMultiple) {
    if (selectedOptions.has(id)) selectedOptions.delete(id);
    else selectedOptions.add(id);
  } else {
    selectedOptions.clear();
    selectedOptions.add(id);
  }
  // Re-render just options
  const q = currentState.currentQuestion;
  if (q) renderVoting(document.getElementById('root'), q, currentState);
}

async function submitVote(questionId) {
  if (selectedOptions.size === 0) return;
  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Отправка...'; }

  try {
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questionId, optionIds: [...selectedOptions], user: VOTE_USER })
    });
    const data = await res.json();
    if (data.success) {
      markVoted(questionId);
      if (currentState) renderSuccess(document.getElementById('root'), currentState.currentQuestion);
    } else {
      alert(data.error || 'Ошибка голосования');
      if (btn) { btn.disabled = false; btn.textContent = 'Проголосовать'; }
    }
  } catch (e) {
    alert('Ошибка сети');
    if (btn) { btn.disabled = false; btn.textContent = 'Проголосовать'; }
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
